# Arna website — static Vue site (nginx) behind Caddy for automatic HTTPS.
#   docker compose up -d --build
#
# If you host behind an existing proxy on ifleon, remove the `caddy` service and
# map the website port instead, e.g.  ports: ["8080:80"].

services:
  website:
    build: .
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - website

volumes:
  caddy_data:
  caddy_config:
