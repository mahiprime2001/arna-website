# Arna website — static Vue site served by nginx inside the container,
# exposed on host port 8080. Your existing host nginx sits in front of it and
# serves https://arna.ifleon.com (see nginx/arna.ifleon.com.conf).
#
#   docker compose up -d --build
#
# Change "8080" below if that port is already taken on the host.

services:
  website:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
