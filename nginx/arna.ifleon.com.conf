# Host nginx server block for the Arna website.
#
# Install:
#   sudo cp nginx/arna.ifleon.com.conf /etc/nginx/sites-available/arna.ifleon.com
#   sudo ln -s /etc/nginx/sites-available/arna.ifleon.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add HTTPS automatically with certbot:
#   sudo certbot --nginx -d arna.ifleon.com
# (certbot rewrites this file to add the SSL listen block + redirect.)

server {
    listen 80;
    listen [::]:80;
    server_name arna.ifleon.com;

    # The site container (docker compose) listens on 127.0.0.1:8080.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
